<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neguinho Motors - Catalogo de Veiculos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="logo"><img src="logooficial.webp" alt="Neguinho Motors" style="height:38px;width:auto;vertical-align:middle;"></div>
            <div class="nav-links">
                <button class="nav-btn active" data-filter="todos">Catalogo</button>
                <button class="nav-btn" data-filter="volkswagen">Volkswagen</button>
                <button class="nav-btn" data-filter="chevrolet">Chevrolet</button>
                <button class="nav-btn" data-filter="ford">Ford</button>
                <button class="nav-btn" data-filter="fiat">Fiat</button>
                <button class="nav-btn" data-filter="mitsubishi">Mitsubishi</button>
                <button class="nav-btn" data-filter="hyundai">Hyundai</button>
            </div>
        </div>
    </nav>

    <section class="hero">
        <div style="max-width: 1280px; margin: 0 auto;">
            <h1><span>2026</span> CATALOGO</h1>
            <p>Veiculos selecionados com qualidade garantida</p>
            <div class="hero-stats">
                <div><div class="stat-number">42</div><div class="stat-label">Veiculos</div></div>
                <div><div class="stat-number">11</div><div class="stat-label">Marcas</div></div>
                <div><div class="stat-number">20+</div><div class="stat-label">Anos</div></div>
            </div>
        </div>
    </section>

    <section class="search-section">
        <div class="search-container">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Buscar por modelo, marca, cor ou ano...">
            </div>
        </div>
    </section>

    <section class="catalog">
        <div class="catalog-header">
            <h2 class="catalog-title">ESTOQUE DISPONIVEL</h2>
            <div class="catalog-divider"></div>
            <span class="catalog-count" id="vehicleCount">42</span>
        </div>
        <div class="vehicles-grid" id="vehiclesGrid"></div>
    </section>

    <div class="modal-bg" id="modalBg">
        <div class="modal">
            <button class="modal-close" onclick="closeModal()">&#x2715;</button>
            <div class="modal-slider">
                <div class="modal-track" id="modalTrack"></div>
                <button class="modal-btn modal-prev" onclick="modalSlide(-1)">&#8249;</button>
                <button class="modal-btn modal-next" onclick="modalSlide(1)">&#8250;</button>
                <div class="modal-dots" id="modalDots"></div>
            </div>
            <div class="modal-body">
                <div class="modal-brand" id="mBrand"></div>
                <div class="modal-model" id="mModel"></div>
                <div class="modal-price" id="mPrice"></div>
                <div class="modal-specs" id="mSpecs"></div>
                <div class="modal-desc" id="mDesc" style="display:none"></div>
                <a class="modal-cta" id="mCta" href="#" target="_blank">&#x1F4F2; Consultar via WhatsApp</a>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-logo">NEGUINHO MOTORS</div>
        <p class="footer-text">2025 - Neguinho Motors - Todos os direitos reservados</p>
    </footer>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
